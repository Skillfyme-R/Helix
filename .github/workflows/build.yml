# =============================================================================
#  HelixEMR CI – Build, Test & Publish
#  Helix Health – Enterprise Electronic Medical Record System
# =============================================================================

name: HelixEMR Build & Test

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx1g -Dfile.encoding=UTF-8"

jobs:

  # ─── Build & Unit Test ─────────────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -P skip-all-checks --no-transfer-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: helixemr-war-${{ github.run_number }}
          path: webapp/target/helixemr.war
          retention-days: 14

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            **/target/surefire-reports/
            **/target/site/jacoco/
          retention-days: 7

  # ─── Integration Tests ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: helixemr_test
          MYSQL_USER: helixemr
          MYSQL_PASSWORD: helixemr
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: mvn verify -P integration-test --no-transfer-progress
        env:
          HELIX_DB_HOSTNAME: localhost
          HELIX_DB_NAME: helixemr_test
          HELIX_DB_USERNAME: helixemr
          HELIX_DB_PASSWORD: helixemr

  # ─── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: helixemr-war-${{ github.run_number }}
          path: webapp/target/

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan (CodeQL)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build for CodeQL
        run: mvn compile -P skip-all-checks --no-transfer-progress

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
