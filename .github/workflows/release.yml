# =============================================================================
#  HelixEMR Release Pipeline
#  Triggered on GitHub release tag (v1.x.x)
# =============================================================================

name: HelixEMR Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./mvnw versions:set -DnewVersion="${VERSION}" --no-transfer-progress -q

      - name: Build release WAR
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: webapp/target/helixemr.war
          generate_release_notes: true
          name: "HelixEMR ${{ github.ref_name }}"
          body: |
            ## HelixEMR ${{ github.ref_name }}

            Released by Helix Health Engineering.

            ### Installation
            See the [Installation Guide](https://github.com/helixhealth/helixemr-core/blob/main/doc/INSTALLATION.md).

            ### Docker
            ```bash
            docker pull ghcr.io/helixhealth/helixemr:${{ github.ref_name }}
            ```
