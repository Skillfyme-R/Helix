# =============================================================================
#  HelixEMR – Docker Compose override for local development
#  Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# =============================================================================

services:
  app:
    build:
      target: builder   # use builder image for faster iteration
    volumes:
      # Mount source for hot-reload (Tomcat with JRebel or Spring DevTools)
      - ./webapp/target/helixemr:/opt/tomcat/webapps/helixemr
      - helixemr-app-data:/var/lib/helixemr
    environment:
      JAVA_OPTS: >-
        -Xmx512m -Xms256m
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
        -Djava.security.egd=file:/dev/./urandom
        -Dfile.encoding=UTF-8
    ports:
      - "8080:8080"
      - "5005:5005"  # Remote debug port

  # pgAdmin / Adminer for DB inspection
  adminer:
    image: adminer:4
    container_name: helixemr-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - helixemr-net
