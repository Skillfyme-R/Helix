# HelixEMR Application Properties
# Helix Health Electronic Medical Record System
# Copyright (C) 2024 Helix Health <https://helixhealth.io>

application.name=HelixEMR
application.vendor=Helix Health
application.url=https://helixhealth.io/emr
application.support.email=support@helixhealth.io

helixemr.version=1.0.0-SNAPSHOT
helixemr.version.short=1.0.0
helixemr.version.long=HelixEMR 1.0.0 (Build ${buildNumber})
helixemr.version.description=Enterprise Electronic Medical Record System

# Database defaults
helixemr.db.name=helixemr
helixemr.db.user=helixemr
helixemr.db.password=helixemr
helixemr.db.url=jdbc:mariadb://helixemr-db:3306/helixemr?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
helixemr.db.driver=org.mariadb.jdbc.Driver

# Module repository
helixemr.module.repository.url=https://modules.helixhealth.io/modules

# Locale / i18n
helixemr.locale.default=en_US
helixemr.locale.allowed.list=en_US,es,fr,de,pt,ar,zh,hi,sw

# Security
helix.admin.password=Admin1234!
helixemr.password.min.length=8
helixemr.password.requires.digit=true
helixemr.password.requires.upper=true
helixemr.session.timeout.minutes=30
helixemr.max.failed.logins=5
helixemr.lockout.duration.minutes=15

# Encounter / Clinical
helixemr.encounter.form.required=false
helixemr.orders.require.encounter=false

# Concept dictionary
helixemr.concept.source.default=CIEL

# Scheduler
helixemr.scheduler.enabled=true
helixemr.scheduler.pool.size=5

# Cache
helixemr.cache.enabled=true
helixemr.cache.provider=ehcache

# Storage
helixemr.storage.path=${user.home}/.helixemr/storage

# Audit logging
helixemr.audit.enabled=true
helixemr.audit.log.path=${user.home}/.helixemr/logs/audit.log

# FHIR / Interoperability
helixemr.fhir.enabled=true
helixemr.fhir.version=R4
helixemr.hl7.enabled=true

# Reporting
helixemr.reporting.enabled=true
helixemr.reporting.cache.seconds=300

# Dashboard
helixemr.dashboard.refresh.seconds=60
helixemr.dashboard.show.alerts=true
